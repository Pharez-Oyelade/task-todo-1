<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pharez - Stage 1a Task</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" aria-label="task">
      <div class="card" id="taskCard">
        <div class="">
          <!-- <div class="task-checkbox-wrap">
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="cb-task"
            aria-label="Mark task as done"
          />
        </div> -->

          <div class="card-title-block">
            <div
              class="priority-indicator high"
              id="priorityIndicator"
              data-testid="test-todo-priority-indicator"
            ></div>
            <span
              data-testid="test-todo-priority"
              class="priority high"
              aria-label="Priority: High"
              id="priorityBadge"
            >
              High
            </span>
            <h2 data-testid="test-todo-title" id="taskTitle" class="title">
              Complete Stage 1 task
            </h2>
            <p
              data-testid="test-todo-description"
              id="taskDescription"
              class="description"
            >
              Extend the todo card and make it more interactive and stateful.
              Adding editable content, status transitions, priority changes,
              expand behavior, and richer accessibility patterns
            </p>

            <!-- expand -->
            <button
              id="toggleDesc"
              class="toggle-desc hidden"
              aria-expanded="false"
            >
              Show more
            </button>
          </div>

          <!-- tags -->
          <ul data-testid="test-todo-tags" role="list" class="tags">
            <li data-testid="test-todo-tag-work">Assignment</li>
            <li data-testid="test-todo-tag-work">Task</li>
            <li data-testid="test-todo-tag-work">Todo</li>
          </ul>
        </div>

        <div class="card-divider" role="separator"></div>

        <!-- due-date -->
        <div class="card-meta">
          <div class="meta-left">
            <span class="due-label">Due date</span>
            <time
              class="due-date"
              datetime=""
              data-testid="test-todo-due-date"
              id="dueDateText"
            ></time>
          </div>

          <time
            data-testid="test-todo-time-remaining"
            id="timeLeft"
            aria-live="polite"
          ></time>
        </div>

        <div class="status-wrap">
          <div class="task-checkbox-wrap">
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              id="completeToggle"
              aria-label="Mark task as done"
            />

            <select
              name="status-control"
              data-testid="test-todo-status-control"
              id="statusSelect"
              class="status-text"
              aria-label="Status-control"
            >
              <option value="Pending">Pending</option>
              <option value="In-Progress">In-Progress</option>
              <option value="Done">Done</option>
            </select>

            <span
              data-testid="test-todo-status"
              id="statusText"
              class="status"
              aria-label="Status"
              >Pending</span
            >
          </div>

          <div class="button-wrap">
            <button
              data-testid="test-todo-edit-button"
              id="editButton"
              aria-label="Edit button"
            >
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              id="deleteButton"
              aria-label="Delete button"
            >
              Delete
            </button>
          </div>
        </div>
      </div>

      <!-- EDIT MODE -->
      <div
        class="card hidden edit-mode"
        id="editMode"
        data-testid="test-todo-edit-form"
      >
        <form id="form">
          <div class="form-group">
            <label for="editTitle">Title</label>
            <input
              data-testid="test-todo-edit-title-input"
              type="text"
              id="editTitle"
              required
            />
          </div>
          <div class="form-group">
            <label for="editDesc">Description</label>
            <textarea
              id="editDesc"
              data-testid="test-todo-edit-description-input"
              required
            ></textarea>
          </div>
          <div class="form-group">
            <label for="editPriority">Priority</label>
            <select
              id="editPriority"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editDate">Due Date</label>
            <input
              type="date"
              id="editDate"
              data-testid="test-todo-edit-due-date-input"
              required
            />
          </div>
          <div class="button-wrap">
            <button type="submit" data-testid="test-todo-save-button">
              Save
            </button>
            <button
              type="button"
              data-testid="test-todo-cancel-button"
              id="cancelBtn"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
